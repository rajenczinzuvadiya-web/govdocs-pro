<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20KB Photo Compressor - GovDocs Pro</title>
    <meta name="description" content="Compress your photo to exactly 20KB online for various applications and portals. No quality loss, instant processing.">
    <link rel="canonical" href="https://govdocs.pro/20kb-photo.html" />
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/icon-192.png">
    <meta name="theme-color" content="#2563eb">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/icon-192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="global.css">
</head>
<body class="bg-slate-50 text-slate-900">
    <header id="main-header" class="glass sticky top-0 z-50 w-full border-b border-slate-200 bg-white"></header>

    <main class="container mx-auto px-4 py-12">
        <div class="max-w-4xl mx-auto">
            <div class="mb-12 text-center">
                <h1 class="text-4xl font-black mb-4">20KB Photo Compressor</h1>
                <p class="text-slate-600 italic">ફોટાને ૨૦ KB માં ઓટોમેટિક કમ્પ્રેસ કરો.</p>
            </div>

            <div class="max-w-2xl mx-auto space-y-6 md:space-y-8">
                <!-- 1. UPLOAD SECTION -->
                <section id="upload-section" class="card">
                    <h2 class="text-xs font-black uppercase text-slate-400 tracking-widest mb-4">Step 1: Upload Photo</h2>
                    <div id="image-upload-container"></div>
                </section>

                <!-- Workspace (Hidden until image is uploaded) -->
                <div id="previewArea" class="hidden space-y-6 md:space-y-8">
                    
                    <!-- 2. PREVIEW SECTION -->
                    <section id="preview-section" class="card">
                        <h2 class="text-xs font-black uppercase text-slate-400 tracking-widest mb-4">Step 2: Preview</h2>
                        <div id="image-preview-container"></div>
                    </section>

                    <!-- 3. COMPRESS SETTINGS -->
                    <section id="settings-section" class="card">
                        <h2 class="text-xs font-black uppercase text-slate-400 tracking-widest mb-4">Step 3: Compression Status</h2>
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="p-3 bg-slate-50 rounded-xl border border-slate-100 text-center">
                                <span class="block text-[10px] font-black uppercase text-slate-400 tracking-widest mb-1">Original Size</span>
                                <span id="original-kb-display" class="text-sm font-bold text-slate-600">-- KB</span>
                            </div>
                            <div class="p-3 bg-blue-50 rounded-xl border border-blue-100 text-center">
                                <span class="block text-[10px] font-black uppercase text-blue-400 tracking-widest mb-1">Final Size</span>
                                <span id="final-kb-display" class="text-sm font-bold text-blue-600">-- KB</span>
                            </div>
                        </div>

                        <div class="space-y-4 text-center">
                            <p class="text-xs text-slate-500 italic">લક્ષિત સાઈઝ ૨૦ KB સેટ કરેલી છે.</p>
                            <button id="applyCompress" class="btn btn-outline border-blue-600 text-blue-600 hover:bg-blue-50 font-bold uppercase text-xs tracking-widest">
                                Re-Compress Image
                            </button>
                        </div>
                    </section>

                    <!-- 4. DOWNLOAD SECTION -->
                    <section id="download-section" class="card">
                        <h2 class="text-xs font-black uppercase text-slate-400 tracking-widest mb-4">Step 4: Final Download</h2>
                        <button id="downloadPhoto" class="btn btn-primary mb-4 font-bold uppercase text-xs tracking-widest">
                            Download JPG
                        </button>

                        <div id="statusContainer" class="w-full p-3 bg-blue-50 text-blue-700 rounded-lg text-center border border-blue-100">
                            <p id="statusMsg" class="text-xs font-bold uppercase tracking-tight">Ready to process</p>
                        </div>
                    </section>
                </div>
            </div>
        </div>
        
        <!-- Hidden Compatibility Hooks for app.js -->
        <div class="hidden">
            <select id="presetSelect" data-tool-type="photo">
                <option value="custom">Custom</option>
            </select>
            <input type="number" id="targetSize" value="20">
            <input type="number" id="manualWidth">
            <input type="number" id="manualHeight">
            <input type="range" id="brightnessInput" value="100">
            <input type="range" id="contrastInput" value="100">
        </div>
    </main>

    <footer id="footer" class="bg-[#0f172a] text-slate-400 py-8 md:py-10 border-t border-slate-800"></footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script type="module" src="app.js"></script>
    <script type="module" src="navigator.js"></script>

    <script>
        // Page specific logic for auto-compression and size display
        window.addEventListener('imageUploaded', (e) => {
            document.getElementById('original-kb-display').innerText = e.detail.size + ' KB';
            // Clear final size when new image uploaded
            document.getElementById('final-kb-display').innerText = '-- KB';
            
            // Auto-trigger compression after a short delay for cropper initialization
            setTimeout(() => {
                document.getElementById('applyCompress')?.click();
            }, 600);
        });

        window.addEventListener('imageCompressed', (e) => {
            document.getElementById('final-kb-display').innerText = e.detail.size + ' KB';
        });
    </script>
</body>
</html>
