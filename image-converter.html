<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter - GovDocs Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/icon-192.png">
    <meta name="description" content="Convert images to JPG, PNG, or WEBP formats online without losing quality.">
    <link rel="canonical" href="https://govdocs.pro/image-converter.html" />
    <meta property="og:title" content="Image Converter - GovDocs Pro">
    <meta property="og:description" content="Convert images to JPG, PNG, or WEBP formats online without losing quality.">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link href="global.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900 flex flex-col min-h-screen">
    <header id="main-header" class="glass sticky top-0 z-50 w-full border-b border-slate-200 bg-white transition-all duration-300"></header>

    <main class="flex-grow container mx-auto px-4 py-12">
        <div class="max-w-4xl mx-auto lg:max-w-6xl xl:max-w-7xl">
            <div class="page-header mb-8">
                <h1 class="text-4xl md:text-5xl font-black tracking-tight text-slate-900 mb-3">Image Converter</h1>
                <p class="text-slate-600 font-medium">ઈમેજને JPG, PNG અથવા WEBP માં કન્વર્ટ કરો.</p>
            </div>

            <div class="max-w-2xl mx-auto lg:max-w-none lg:grid lg:grid-cols-2 lg:gap-8 lg:items-start space-y-6 md:space-y-8 lg:space-y-0">
                
                <!-- 1. UPLOAD IMAGE SECTION -->
                <section id="upload-section" class="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm lg:col-span-2 max-w-2xl mx-auto w-full">
                    <h2 class="text-[11px] font-black uppercase text-slate-400 tracking-widest mb-5">Step 1: Upload Image</h2>
                    <div id="image-upload-container"></div>
                </section>

                <!-- Workspace (Hidden until image is uploaded) -->
                <div id="workspace" class="hidden lg:col-span-2 lg:grid lg:grid-cols-[1.2fr,1fr] lg:gap-8 lg:items-start space-y-6 md:space-y-8 lg:space-y-0">
                    
                    <!-- Left Column: Preview -->
                    <section id="preview-section" class="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm lg:row-span-2">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-[11px] font-black uppercase text-slate-400 tracking-widest">Step 2: Preview</h2>
                            <button id="change-photo-btn" class="text-[10px] font-bold text-blue-600 hover:text-blue-700 hover:underline flex items-center gap-1 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                                Change Image
                            </button>
                        </div>
                        <div class="bg-slate-50/50 rounded-2xl border-2 border-dashed border-slate-200 overflow-hidden flex justify-center items-center min-h-[300px] p-4 relative">
                            <img id="previewImage" class="max-w-full max-h-[400px] shadow-sm rounded-lg object-contain z-10" alt="Preview">
                            <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+CjxyZWN0IHdpZHRoPSIxMCIgaGVpZ2h0PSIxMCIgZmlsbD0iI2VlZSIgLz4KPHJlY3QgeD0iMTAiIHdpZHRoPSIxMCIgaGVpZ2h0PSIxMCIgZmlsbD0iI2ZmZiIgLz4KPHJlY3QgeT0iMTAiIHdpZHRoPSIxMCIgaGVpZ2h0PSIxMCIgZmlsbD0iI2ZmZiIgLz4KPHJlY3QgeD0iMTAiIHk9IjEwIiB3aWR0aD0iMTAiIGhlaWdodD0iMTAiIGZpbGw9IiNlZWUiIC8+Cjwvc3ZnPg==')] opacity-50 pointer-events-none"></div>
                        </div>
                        <div class="mt-4 flex justify-between bg-slate-50 p-3 rounded-xl border border-slate-100">
                            <span id="origFormat" class="text-xs font-bold text-slate-600">Format: -</span>
                            <span id="origSize" class="text-xs font-bold text-slate-600">Size: -</span>
                        </div>
                    </section>

                    <!-- Right Column: Controls -->
                    <section id="settings-section" class="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm">
                        <h2 class="text-[11px] font-black uppercase text-slate-400 tracking-widest mb-5">Step 3: Convert & Download</h2>
                        
                        <div class="space-y-6">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">Convert To</label>
                                <select id="formatSelect" class="w-full p-4 bg-slate-50/70 border border-slate-200 rounded-[16px] text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all appearance-none" style="background-image: url('data:image/svg+xml,%3csvg xmlns=\'http://www.w3.org/2000/svg\' fill=\'none\' viewBox=\'0 0 20 20\'%3e%3cpath stroke=\'%236b7280\' stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'1.5\' d=\'M6 8l4 4 4-4\'/%3e%3c/svg%3e'); background-position: right 1rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em;">
                                    <option value="image/jpeg">JPG / JPEG (Standard Format)</option>
                                    <option value="image/png">PNG (Preserves Transparency)</option>
                                    <option value="image/webp">WEBP (Best Compression)</option>
                                </select>
                            </div>

                            <button id="downloadBtn" class="w-full flex items-center justify-center gap-2 bg-blue-600 text-white font-black py-4 rounded-[16px] hover:bg-blue-700 transition-all shadow-[0_8px_20px_rgb(37,99,235,0.25)] hover:shadow-[0_10px_25px_rgb(37,99,235,0.35)] hover:-translate-y-0.5">
                                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                                Download Converted Image
                            </button>

                            <div id="statusContainer" class="hidden mt-4 p-3 rounded-xl border text-sm font-bold text-center">
                                <span id="statusMsg">Ready to process</span>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer" class="bg-slate-900 py-12 mt-auto"></footer>

    <script type="module" src="navigator.js"></script>
    <script type="module">
        import { ImageUploader } from './image-uploader.js';
        import { HistoryManager } from './history-manager.js';

        let currentImageObj = null;

        document.addEventListener('DOMContentLoaded', () => {
            ImageUploader.render('image-upload-container', (imageSrc) => {
                const img = new Image();
                img.onload = () => {
                    currentImageObj = img;
                    document.getElementById('previewImage').src = imageSrc;
                    document.getElementById('upload-section').classList.add('hidden');
                    document.getElementById('workspace').classList.remove('hidden');

                    const sizeKb = Math.round((imageSrc.length * 0.75) / 1024);
                    const mimeTypeMatch = imageSrc.match(/^data:(.*?);/);
                    const mimeType = mimeTypeMatch ? mimeTypeMatch[1] : 'Unknown';

                    document.getElementById('origFormat').innerText = `Format: ${mimeType.split('/')[1].toUpperCase()}`;
                    document.getElementById('origSize').innerText = `Size: ${sizeKb} KB`;
                };
                img.src = imageSrc;
            });

            document.addEventListener('click', (e) => {
                if (e.target.id === 'change-photo-btn' || e.target.closest('#change-photo-btn')) {
                    document.getElementById('imageInput')?.click();
                }
            });

            document.getElementById('downloadBtn').addEventListener('click', () => {
                if (!currentImageObj) return;
                
                const targetFormat = document.getElementById('formatSelect').value;
                const ext = targetFormat.split('/')[1].replace('jpeg', 'jpg');

                const canvas = document.createElement('canvas');
                canvas.width = currentImageObj.naturalWidth;
                canvas.height = currentImageObj.naturalHeight;
                const ctx = canvas.getContext('2d');

                if (targetFormat === 'image/jpeg') {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                
                ctx.drawImage(currentImageObj, 0, 0);

                canvas.toBlob((blob) => {
                    if (!blob) return;
                    
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `converted_${Date.now()}.${ext}`;
                    a.click();

                    HistoryManager.save({
                        toolName: 'Image Converter',
                        preset: ext.toUpperCase(),
                        size: `${Math.round(blob.size / 1024)} KB`
                    });

                    setTimeout(() => URL.revokeObjectURL(url), 2000);
                }, targetFormat, 0.95);
            });
        });
    </script>
</body>
</html>
