<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GovDocs Pro - Documents & Photo Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/icon-192.png">
    <link rel="stylesheet" href="global.css">
</head>
<body class="bg-slate-50 text-slate-900">
    <header id="main-header" class="glass sticky top-0 z-50 w-full border-b border-slate-200 bg-white">
        <!-- Injected by header.js -->
    </header>

    <main class="container mx-auto px-4 pt-8 pb-4 md:pt-12 md:pb-8">
        <!-- Hero Section -->
        <section id="hero" class="max-w-4xl mx-auto text-center mb-6">
            <p class="text-[10px] md:text-xs font-black uppercase text-slate-400 tracking-[0.3em] mb-6">
                Photo • PDF • Document Tools
            </p>
            
            <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tight leading-[1.1]">
                <span class="text-blue-600" data-lang="hero_title_highlight">ડોક્યુમેન્ટ્સ અને ફોટા</span><br>
                <span data-lang="hero_title_main">એક જ મિનિટમાં તૈયાર કરો</span>
            </h1>

            <p class="text-slate-600 text-lg md:text-xl max-w-2xl mx-auto mb-6 leading-relaxed" data-lang="hero_desc">
                ફોટા રિસાઇઝ કરો, કોમ્પ્રેસ કરો, PDF બનાવો અને તમારા ડોક્યુમેન્ટ્સને સરળતાથી મેનેજ કરો — એક જ જગ્યાએ.
            </p>

            <!-- Feature Line -->
            <div class="flex flex-wrap justify-center gap-3 md:gap-6 text-[10px] md:text-xs font-black text-slate-400 uppercase tracking-widest">
                <span>Resize</span>
                <span class="text-slate-200">/</span>
                <span>Compress</span>
                <span class="text-slate-200">/</span>
                <span>Convert</span>
                <span class="text-slate-200">/</span>
                <span>Create</span>
            </div>
        </section>

        <!-- Category Filter Pills -->
        <div class="max-w-4xl mx-auto mb-8 md:mb-10 px-4 md:px-0">
            <div class="flex overflow-x-auto md:justify-center gap-2.5 pb-2 hide-scrollbar snap-x">
                <button class="filter-pill active snap-center whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold transition-all bg-blue-600 text-white border border-transparent shadow-md shadow-blue-200" data-filter="all" data-lang="nav_all">All</button>
                <button class="filter-pill snap-center whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold transition-all bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 hover:border-blue-200 hover:text-blue-600" data-filter="photo" data-lang="nav_photo_tools">Photo Tools</button>
                <button class="filter-pill snap-center whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold transition-all bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 hover:border-blue-200 hover:text-blue-600" data-filter="pdf" data-lang="nav_pdf_tools">PDF Tools</button>
                <button class="filter-pill snap-center whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold transition-all bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 hover:border-blue-200 hover:text-blue-600" data-filter="signature" data-lang="nav_signature_tools">Signature Tools</button>
                <button class="filter-pill snap-center whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold transition-all bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 hover:border-blue-200 hover:text-blue-600" data-filter="passport" data-lang="nav_passport_tools">Passport Tools</button>
                <button class="filter-pill snap-center whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold transition-all bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 hover:border-blue-200 hover:text-blue-600" data-filter="presets" data-lang="nav_presets">Presets</button>
            </div>
        </div>

        <!-- Tool Directory / Cards Section -->
        <section id="directory" class="max-w-6xl mx-auto">
            <div id="tools-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5">
                <!-- Tool cards will be rendered here by navigator.js or a separate script -->
            </div>
            <div id="no-results" class="hidden text-center py-12 text-slate-400 text-sm">No tools found</div>
        </section>
    </main>

    <footer id="footer" class="bg-[#0f172a] text-slate-400 py-10 md:py-12 border-t border-slate-800">
        <!-- Injected by footer.js -->
    </footer>

    <script type="module" src="navigator.js"></script>
</body>
</html>
