<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GovDocs Pro - Documents & Photo Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/icon-192.png">
    <link rel="stylesheet" href="global.css">
</head>
<body class="bg-slate-50 text-slate-900">
    <header id="main-header" class="glass sticky top-0 z-50 w-full border-b border-slate-200 bg-white">
        <!-- Injected by header.js -->
    </header>

    <main class="container mx-auto px-4 pt-8 pb-4 md:pt-12 md:pb-8">
        <!-- Hero Section -->
        <section id="hero" class="max-w-4xl mx-auto text-center mb-6">
            <p class="text-[10px] md:text-xs font-black uppercase text-slate-400 tracking-[0.3em] mb-6">
                Photo • PDF • Document Tools
            </p>
            
            <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tight leading-[1.1]">
                <span class="text-blue-600">ડોક્યુમેન્ટ્સ અને ફોટા</span><br>
                એક જ મિનિટમાં તૈયાર કરો
            </h1>

            <p class="text-slate-600 text-lg md:text-xl max-w-2xl mx-auto mb-8 leading-relaxed">
                ફોટા રિસાઇઝ કરો, કોમ્પ્રેસ કરો, PDF બનાવો અને તમારા ડોક્યુમેન્ટ્સને સરળતાથી મેનેજ કરો — એક જ જગ્યાએ.
            </p>

            <!-- Search Box -->
            <div class="max-w-xl mx-auto mb-8 relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 group-focus-within:text-blue-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" id="tool-search-main" placeholder="ટૂલ્સ શોધો: દા.ત. Passport, PDF..." 
                    class="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-3xl shadow-xl shadow-slate-200/50 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none text-base font-medium">
            </div>

            <!-- Feature Line -->
            <div class="flex flex-wrap justify-center gap-3 md:gap-6 text-[10px] md:text-xs font-black text-slate-400 uppercase tracking-widest">
                <span>Resize</span>
                <span class="text-slate-200">/</span>
                <span>Compress</span>
                <span class="text-slate-200">/</span>
                <span>Convert</span>
                <span class="text-slate-200">/</span>
                <span>Create</span>
            </div>
        </section>

        <!-- Tool Directory / Cards Section -->
        <section id="directory" class="max-w-6xl mx-auto">
            <div id="tools-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5">
                <!-- Tool cards will be rendered here by navigator.js or a separate script -->
            </div>
            <div id="no-results" class="hidden text-center py-12 text-slate-400 text-sm">No tools found</div>
        </section>
    </main>

    <footer id="footer" class="bg-[#0f172a] text-slate-400 py-10 md:py-12 border-t border-slate-800">
        <!-- Injected by footer.js -->
    </footer>

    <script type="module" src="navigator.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('tool-search-main');
            const toolsList = document.getElementById('tools-list');

            const filterTools = () => {
                const query = searchInput.value.toLowerCase().trim();
                const cards = toolsList.querySelectorAll('[data-tool]');
                let visibleCount = 0;
                
                cards.forEach(card => {
                    const title = (card.dataset.tool || '').toLowerCase();
                    const keywords = (card.dataset.keywords || '').toLowerCase();
                    const matches = title.includes(query) || keywords.includes(query);
                    card.style.display = matches ? 'flex' : 'none';
                    if (matches) visibleCount++;
                });

                // Toggle visibility of category groupings based on visible results
                toolsList.querySelectorAll(':scope > div').forEach(group => {
                    const hasVisible = group.querySelectorAll('[data-tool]:not([style*="display: none"])').length > 0;
                    group.style.display = hasVisible ? 'block' : 'none';
                });

                const noResults = document.getElementById('no-results');
                if (noResults) {
                    noResults.style.display = (visibleCount === 0 && query !== '') ? 'block' : 'none';
                }
            };

            searchInput?.addEventListener('input', filterTools);

            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && searchInput) {
                    searchInput.value = '';
                    filterTools();
                }
            });
        });
    </script>
</body>
</html>
